services:
  - type: web
    name: achadinhos-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # [FIX] DATABASE_URL estava ausente — sem ele o app usa sqlite local
      # (ephemeral, dados perdidos a cada redeploy).
      - key: DATABASE_URL
        value: sqlite:////data/achadinhos.db
      - key: WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: PAGE_ACCESS_TOKEN
        sync: false
      - key: ADMIN_SECRET
        sync: false
      # [FIX] CORS: origem do frontend para não usar allow_origins=["*"]
      - key: FRONTEND_ORIGIN
        sync: false   # ex: https://achadinhos.vercel.app
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
